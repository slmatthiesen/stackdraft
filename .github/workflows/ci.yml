name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    # ubuntu-latest ships python3 / make / g++, which the native better-sqlite3
    # build (allowlisted via pnpm.onlyBuiltDependencies) needs.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
